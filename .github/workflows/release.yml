  #           ```bash
  #           pip install pydynox==${{ needs.prepare.outputs.version }}
  #           ```
  #       env:
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    name: Deploy Documentation
    needs: publish
    uses: ./.github/workflows/docs.yml
