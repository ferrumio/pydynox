name: Agent Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install Claude Code and LSP servers
        run: |
          npm install -g @anthropic-ai/claude-code pyright
          rustup component add rust-analyzer

      - name: Get PR diff
        run: git diff origin/main...HEAD > /tmp/pr-diff.patch

      - name: Run agent review
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: us-east-1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PROMPT="$(cat .github/agent/prompts/pr-review.md)

          == CONTEXT ==
          PR_NUMBER: ${PR_NUMBER}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPOSITORY: ${{ github.repository }}"

          claude -p "$PROMPT" \
            --allowedTools "Read,Glob,Grep,Write,Bash(gh api:*),Bash(gh pr review:*),Bash(gh pr merge:*),Bash(gh pr edit:*),Bash(sleep:*)" \
            --max-turns 50 \
            --verbose
