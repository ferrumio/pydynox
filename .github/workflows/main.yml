name: Main

on:
    push:
        branches: [main]
        paths:
            - "src/**"
            - "python/**"
            - "tests/**"
            - "Cargo.toml"
            - "Cargo.lock"
            - "pyproject.toml"
            - "uv.lock"

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: "3.14"
                  allow-prereleases: true

            - name: Build wheel
              uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
              with:
                  command: build
                  args: --release --out dist
                  sccache: true

            - name: Upload wheel
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with:
                  name: wheel
                  path: dist/*.whl
                  retention-days: 1

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: "3.14"
                  allow-prereleases: true

            - name: Download wheel
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: wheel
                  path: dist

            - name: Create venv
              run: python -m venv .venv

            - name: Install wheel and dependencies
              run: |
                  source .venv/bin/activate
                  pip install dist/*.whl
                  pip install pytest pytest-asyncio pytest-cov hypothesis testcontainers boto3 pydantic opentelemetry-api opentelemetry-sdk

            - name: Run tests with coverage
              run: |
                  source .venv/bin/activate
                  pytest tests/ -v --cov=pydynox --cov-report=xml --ignore=tests/benchmark --ignore=tests/memory

            - name: Upload coverage
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: coverage.xml
                  fail_ci_if_error: false
                  name: pydynox-main
